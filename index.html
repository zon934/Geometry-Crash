<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Crash - Spike Groups</title>
    <style>
        :root { --primary: #00ffcc; }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.9); z-index: 100; color: white; }
        .container { text-align: center; padding: 25px; border: 3px solid var(--primary); border-radius: 30px; background: #111; width: 90%; max-width: 450px; }
        
        .menu-row { margin: 15px 0; }
        select { background: #222; color: white; border: 2px solid #444; padding: 12px; border-radius: 10px; width: 100%; font-size: 16px; font-family: inherit; }
        
        button { padding: 18px; font-size: 22px; font-weight: 900; background: var(--primary); border: none; border-radius: 15px; cursor: pointer; text-transform: uppercase; color: #000; width: 100%; }
        
        .colors { display: flex; gap: 15px; margin: 20px 0; justify-content: center; }
        .dot { width: 40px; height: 40px; border-radius: 10px; cursor: pointer; border: 3px solid transparent; }
        .dot.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 15px var(--primary); }

        #rotate-message { display: none; position: fixed; inset: 0; background: #000; color: white; z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        @media (orientation: portrait) { #rotate-message { display: flex; } }
    </style>
</head>
<body>

<div id="rotate-message"><h1>🔄</h1><h2>MODE PAYSAGE</h2></div>

<div id="ui">
    <div class="container">
        <h1 id="msg">GEO CRASH</h1>
        <div id="best-score" style="color:#888; margin-bottom: 10px;">Record: 0</div>
        
        <div class="menu-row">
            <select id="levelSelect">
                <option value="facile">NIVEAU : FACILE</option>
                <option value="moyen" selected>NIVEAU : MOYEN</option>
                <option value="difficile">NIVEAU : DIFFICILE</option>
                <option value="impossible">NIVEAU : IMPOSSIBLE</option>
            </select>
        </div>

        <div class="colors">
            <div class="dot active" style="background:#00ffcc" data-color="#00ffcc"></div>
            <div class="dot" style="background:#ffea00" data-color="#ffea00"></div>
            <div class="dot" style="background:#ff0077" data-color="#ff0077"></div>
            <div class="dot" style="background:#0099ff" data-color="#0099ff"></div>
        </div>
        
        <button id="playBtn">JOUER</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");
const playBtn = document.getElementById("playBtn");

let isPlaying = false, isPressing = false;
let groundY, ceilingY, score = 0, speed = 9, shake = 0;
let obstacles = [], portals = [], pillars = [];
let nextSpawn = 0, nextPortal = 600;

let highScore = localStorage.getItem("geoCrashScore") || 0;
let deaths = parseInt(localStorage.getItem("geoCrashDeaths")) || 0;
document.getElementById("best-score").innerText = `Record: ${highScore}`;

let player = {
    x: 150, y: 0, size: 40, vy: 0, gravity: 0.9, jump: -16, 
    rot: 0, color: "#00ffcc", grounded: false, 
    mode: "cube", gravDir: 1 
};

// Vitesse normale pour tout le monde, seule la fréquence change légèrement
const diffSettings = {
    facile: { spawnMin: 70, spawnMax: 90 },
    moyen: { spawnMin: 50, spawnMax: 70 },
    difficile: { spawnMin: 35, spawnMax: 50 },
    impossible: { spawnMin: 25, spawnMax: 35 }
};

function resize() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    groundY = canvas.height - 80; ceilingY = 80;
}
window.addEventListener('resize', resize);
resize();

// --- COULEURS ---
document.querySelectorAll('.dot').forEach(dot => {
    dot.addEventListener('click', (e) => {
        e.stopPropagation();
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        dot.classList.add('active');
        player.color = dot.dataset.color;
        document.documentElement.style.setProperty('--primary', player.color);
    });
});

// --- JEU ---
playBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    deaths++;
    localStorage.setItem("geoCrashDeaths", deaths);
    
    speed = 9; // Vitesse normale fixe
    score = 0; obstacles = []; portals = []; pillars = [];
    player.vy = 0; player.rot = 0; player.mode = "cube"; player.gravDir = 1;
    player.y = groundY - player.size;
    
    isPlaying = true;
    ui.style.display = "none";
});

window.addEventListener('mousedown', () => { if(isPlaying) { isPressing = true; if(player.mode === "cube") jump(); }});
window.addEventListener('mouseup', () => isPressing = false);
window.addEventListener('touchstart', (e) => { 
    if(isPlaying && e.target.tagName !== "BUTTON") { isPressing = true; if(player.mode === "cube") jump(); e.preventDefault(); }
}, {passive: false});
window.addEventListener('touchend', () => isPressing = false);

function jump() {
    if (player.grounded) {
        player.vy = player.jump * player.gravDir;
        player.grounded = false;
    }
}

function gameOver() {
    isPlaying = false;
    shake = 20;
    if (Math.floor(score/10) > highScore) {
        highScore = Math.floor(score/10);
        localStorage.setItem("geoCrashScore", highScore);
    }
    document.getElementById("msg").innerText = "TENTATIVE " + deaths;
    document.getElementById("best-score").innerText = `Record: ${highScore}`;
    ui.style.display = "flex";
}

function update() {
    if (!isPlaying) return;

    if (player.mode === "ship") {
        player.vy += (isPressing ? -0.8 : 0.8) * player.gravDir;
        player.vy *= 0.95;
        player.rot = player.vy * 2;
    } else {
        player.vy += player.gravity * player.gravDir;
        if (!player.grounded) player.rot += 6 * player.gravDir;
    }
    player.y += player.vy;

    // Collisions Sols
    if (player.y >= groundY - player.size && player.gravDir === 1) {
        player.y = groundY - player.size; player.vy = 0; player.grounded = true; player.rot = Math.round(player.rot/90)*90;
    } else if (player.y <= ceilingY && player.gravDir === -1) {
        player.y = ceilingY; player.vy = 0; player.grounded = true; player.rot = Math.round(player.rot/90)*90;
    } else {
        player.grounded = false;
    }

    if (player.y < ceilingY - 20 || player.y > groundY + 20) gameOver();

    // Spawn Obstacles (Groupes de 1 à 3)
    if (nextSpawn-- <= 0) {
        const config = diffSettings[document.getElementById("levelSelect").value];
        if (player.mode === "cube") {
            let count = Math.floor(Math.random() * 3) + 1; // 1, 2 ou 3 piques
            for(let i=0; i<count; i++) {
                obstacles.push({ x: canvas.width + (i * 32), w: 32, h: 38, type: player.gravDir === 1 ? 'bottom' : 'top' });
            }
        } else {
            let gap = 180;
            let h = 40 + Math.random() * (groundY - ceilingY - gap - 40);
            pillars.push({ x: canvas.width, w: 60, h: h, pos: 'top' });
            pillars.push({ x: canvas.width, w: 60, h: (groundY - ceilingY) - h - gap, pos: 'bottom' });
        }
        nextSpawn = config.spawnMin + Math.random() * (config.spawnMax - config.spawnMin);
    }

    if (score > nextPortal) {
        portals.push({ x: canvas.width, type: player.mode === "cube" ? "ship" : "cube", grav: Math.random() > 0.8 ? -player.gravDir : player.gravDir });
        nextPortal = score + 1200;
    }

    // Collisions
    [...obstacles, ...portals, ...pillars].forEach((obj) => {
        obj.x -= speed;
        let m = 8; // Marge d'erreur
        if (player.x + player.size - m > obj.x && player.x + m < obj.x + (obj.w || 30)) {
            if (obj.h) {
                let yMin = (obj.type === 'top' || obj.pos === 'top') ? ceilingY : groundY - obj.h;
                let yMax = (obj.type === 'top' || obj.pos === 'top') ? ceilingY + obj.h : groundY;
                if (player.y + player.size - m > yMin && player.y + m < yMax) gameOver();
            } else {
                player.mode = obj.type; player.gravDir = obj.grav;
                portals.splice(portals.indexOf(obj), 1);
            }
        }
    });

    score++;
}

function draw() {
    ctx.save();
    if (shake > 0) { ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.9; }
    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (isPlaying) {
        ctx.textAlign = "center"; ctx.font = "bold 80px Arial";
        ctx.fillStyle = "rgba(255, 255, 255, 0.04)";
        ctx.fillText("TENTATIVE " + deaths, canvas.width/2, canvas.height/2 + 30);
    }

    ctx.fillStyle = "#111"; ctx.fillRect(0, groundY, canvas.width, 80); ctx.fillRect(0, 0, canvas.width, ceilingY);
    ctx.fillStyle = player.color; ctx.fillRect(0, groundY, canvas.width, 2); ctx.fillRect(0, ceilingY, canvas.width, 2);

    pillars.forEach(p => {
        ctx.fillStyle = "#151515"; ctx.strokeStyle = player.color;
        let y = p.pos === 'top' ? ceilingY : groundY - p.h;
        ctx.fillRect(p.x, y, p.w, p.h); ctx.strokeRect(p.x, y, p.w, p.h);
    });

    portals.forEach(p => {
        ctx.fillStyle = p.type === "ship" ? "#ff00ff" : "#00ffff";
        ctx.fillRect(p.x, ceilingY, 30, groundY - ceilingY);
    });

    ctx.save();
    ctx.translate(player.x + player.size/2, player.y + player.size/2);
    ctx.rotate(player.rot * Math.PI / 180);
    ctx.fillStyle = player.color;
    if(player.mode === "ship") {
        ctx.beginPath(); ctx.moveTo(-20, 15); ctx.lineTo(25, 0); ctx.lineTo(-20, -15); ctx.fill();
    } else {
        ctx.fillRect(-20, -20, 40, 40); ctx.strokeStyle = "white"; ctx.strokeRect(-20, -20, 40, 40);
    }
    ctx.restore();

    ctx.fillStyle = "#ff0055";
    obstacles.forEach(o => {
        ctx.beginPath();
        if(o.type === 'bottom') { ctx.moveTo(o.x, groundY); ctx.lineTo(o.x+16, groundY-o.h); ctx.lineTo(o.x+32, groundY); }
        else { ctx.moveTo(o.x, ceilingY); ctx.lineTo(o.x+16, ceilingY+o.h); ctx.lineTo(o.x+32, ceilingY); }
        ctx.fill();
    });

    ctx.restore();
    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
