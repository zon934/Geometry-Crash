<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Rhythm - STABLE EDITION</title>
    <style>
        :root { --primary: #00ffcc; --admin: #ff0000; }
        * { box-sizing: border-box; user-select: none; touch-action: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }

        /* INTERFACE PRINCIPALE */
        #ui { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); z-index: 100; color: white; }
        .menu { text-align: center; background: #111; padding: 30px; border: 3px solid var(--primary); border-radius: 20px; width: 320px; }
        button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; }
        #startBtn { background: var(--primary); color: #000; }

        /* PANEL ADMIN */
        #adminToggle { position: absolute; bottom: 15px; right: 15px; z-index: 200; font-size: 24px; opacity: 0.5; cursor: pointer; }
        #adminPanel { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1a0000; border: 2px solid var(--admin); padding: 20px; border-radius: 15px;
            display: none; z-index: 300; width: 280px; color: white;
        }
        .admin-row { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        
        #stats { position: absolute; top: 15px; left: 15px; color: white; font-size: 18px; z-index: 50; }
    </style>
</head>
<body>

<div id="stats">🪙 PIÈCES: <span id="coinTotal">0</span></div>
<div id="adminToggle">⚙️</div>

<div id="adminPanel">
    <h3 style="color:red; margin-top:0;">ADMIN PANEL</h3>
    <div class="admin-row">
        <span>GOD MODE</span>
        <input type="checkbox" id="godCheck">
    </div>
    <div class="admin-row">
        <span>PIÈCES</span>
        <button onclick="addAdminCoins()" style="padding:5px; font-size:12px; width:auto;">+1000</button>
    </div>
    <div class="admin-row">
        <span>SAUT</span>
        <input type="range" id="gravRange" min="10" max="30" value="16">
    </div>
    <button onclick="closeAdmin()" style="background:#333; color:white;">FERMER</button>
</div>

<div id="ui">
    <div class="menu">
        <h1 style="color:var(--primary)">GEO-DASH</h1>
        <p>Cliquez pour sauter</p>
        <button id="startBtn">JOUER</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// États du jeu
let isPlaying = false;
let isPressing = false;
let score = 0;
let coins = parseInt(localStorage.getItem("coins")) || 0;
let obstacles = [];
let nextSpawn = 0;
let godMode = false;

// Joueur
let player = {
    x: 100, y: 0, size: 40, vy: 0,
    gravity: 0.9, jumpPower: -16, grounded: false
};

// Initialisation
function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    groundY = canvas.height - 100;
    player.y = groundY - player.size;
    document.getElementById("coinTotal").innerText = coins;
}

window.onresize = init;
init();

// --- COMMANDES ---
function jump() {
    if (isPlaying && player.grounded) {
        player.vy = player.jumpPower;
        player.grounded = false;
    }
}

window.addEventListener("mousedown", () => { isPressing = true; jump(); });
window.addEventListener("mouseup", () => isPressing = false);
window.addEventListener("touchstart", (e) => { isPressing = true; jump(); e.preventDefault(); }, {passive: false});
window.addEventListener("touchend", () => isPressing = false);
window.addEventListener("keydown", (e) => { if(e.code === "Space") jump(); });

// --- ADMIN FUNCTIONS ---
const adminToggle = document.getElementById("adminToggle");
const adminPanel = document.getElementById("adminPanel");
const godCheck = document.getElementById("godCheck");
const gravRange = document.getElementById("gravRange");

adminToggle.onclick = () => adminPanel.style.display = "block";
function closeAdmin() { adminPanel.style.display = "none"; }
function addAdminCoins() { 
    coins += 1000; 
    localStorage.setItem("coins", coins);
    document.getElementById("coinTotal").innerText = coins;
}

// --- BOUCLE DE JEU ---
document.getElementById("startBtn").onclick = () => {
    isPlaying = true;
    score = 0;
    obstacles = [];
    player.y = groundY - player.size;
    player.vy = 0;
    document.getElementById("ui").style.display = "none";
};

function update() {
    if (!isPlaying) return;

    // Admin Settings
    godMode = godCheck.checked;
    player.jumpPower = -parseInt(gravRange.value);

    // Physique
    player.vy += player.gravity;
    player.y += player.vy;

    if (player.y > groundY - player.size) {
        player.y = groundY - player.size;
        player.vy = 0;
        player.grounded = true;
    }

    // Obstacles
    if (nextSpawn-- <= 0) {
        obstacles.push({ x: canvas.width, w: 30, h: 40 });
        nextSpawn = 60 + Math.random() * 40;
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
        let o = obstacles[i];
        o.x -= 10;

        // Collision
        if (player.x < o.x + o.w && player.x + player.size > o.x && 
            player.y + player.size > groundY - o.h) {
            if (!godMode) {
                isPlaying = false;
                document.getElementById("ui").style.display = "flex";
            }
        }
        if (o.x < -50) obstacles.splice(i, 1);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Sol
    ctx.fillStyle = "#222";
    ctx.fillRect(0, groundY, canvas.width, 100);
    ctx.strokeStyle = "#00ffcc";
    ctx.strokeRect(0, groundY, canvas.width, 2);

    // Obstacles (Piques)
    ctx.fillStyle = "red";
    obstacles.forEach(o => {
        ctx.beginPath();
        ctx.moveTo(o.x, groundY);
        ctx.lineTo(o.x + o.w/2, groundY - o.h);
        ctx.lineTo(o.x + o.w, groundY);
        ctx.fill();
    });

    // Joueur
    ctx.fillStyle = "#00ffcc";
    if (godMode) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = "red";
    }
    ctx.fillRect(player.x, player.y, player.size, player.size);
    ctx.shadowBlur = 0;

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
