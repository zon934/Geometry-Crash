<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Geometry Fix Final</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        canvas { display: block; }
        
        /* Interface de base */
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #stats { position: absolute; top: 10px; left: 10px; font-size: 20px; color: gold; }
        
        /* Panel Admin */
        #adminBtn { position: absolute; top: 10px; right: 10px; background: red; padding: 10px; cursor: pointer; z-index: 20; font-weight: bold; border-radius: 5px; }
        #adminPanel { position: absolute; top: 60px; right: 10px; background: #222; border: 2px solid red; padding: 15px; display: none; z-index: 20; width: 200px; }
        
        .btn { background: #00ffcc; border: none; padding: 10px 20px; font-size: 18px; cursor: pointer; border-radius: 5px; margin: 10px; font-weight: bold; }
        .adm-row { margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .small-btn { background: #444; color: white; border: 1px solid #666; cursor: pointer; padding: 4px; }
        .active { background: red !important; }
    </style>
</head>
<body>

<div id="stats">🪙 Pièces: <span id="coinCount">0</span></div>
<div id="adminBtn" onclick="toggleAdmin()">MENU ADMIN</div>

<div id="adminPanel">
    <div class="adm-row">
        <span>IMMORTEL</span>
        <input type="checkbox" id="godMode">
    </div>
    <div class="adm-row">
        <span>MODE :</span>
        <button class="small-btn active" id="cubeBtn" onclick="setMode('cube')">CUBE</button>
        <button class="small-btn" id="shipBtn" onclick="setMode('ship')">SHIP</button>
    </div>
    <div class="adm-row">
        <span>BOOSTS :</span>
        <button class="small-btn" id="fireBtn" onclick="togglePower('fire')">FEU</button>
        <button class="small-btn" id="speedBtn" onclick="togglePower('speed')">VITESSE</button>
    </div>
    <button class="small-btn" style="width:100%" onclick="addCoins()">+1000 PIÈCES</button>
</div>

<div id="menu">
    <h1>GEOMETRY RHYTHM</h1>
    <button class="btn" onclick="startGame()">JOUER</button>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    // Variables de jeu
    let playing = false;
    let coins = 0;
    let groundY = window.innerHeight / 1.5; // Sol bien visible
    let obstacles = [];
    let nextSpawn = 0;
    
    // Pouvoirs
    let hasFire = false;
    let hasSpeed = false;

    let player = {
        x: 100, y: 0, size: 40, vy: 0, 
        gravity: 0.8, jump: -15, grounded: false, mode: 'cube'
    };

    function toggleAdmin() {
        let p = document.getElementById("adminPanel");
        p.style.display = p.style.display === "block" ? "none" : "block";
    }

    function setMode(m) {
        player.mode = m;
        document.getElementById("cubeBtn").classList.toggle("active", m === 'cube');
        document.getElementById("shipBtn").classList.toggle("active", m === 'ship');
    }

    function togglePower(p) {
        if(p === 'fire') {
            hasFire = !hasFire;
            document.getElementById("fireBtn").classList.toggle("active", hasFire);
        } else {
            hasSpeed = !hasSpeed;
            document.getElementById("speedBtn").classList.toggle("active", hasSpeed);
        }
    }

    function addCoins() {
        coins += 1000;
        document.getElementById("coinCount").innerText = coins;
    }

    function startGame() {
        playing = true;
        obstacles = [];
        player.y = groundY - player.size;
        player.vy = 0;
        document.getElementById("menu").style.display = "none";
    }

    // Commandes
    let isPressing = false;
    window.onmousedown = () => { isPressing = true; if(player.mode === 'cube' && player.grounded) player.vy = hasFire ? -20 : -15; };
    window.onmouseup = () => isPressing = false;
    window.onkeydown = (e) => { if(e.code === "Space") { if(player.mode === 'cube' && player.grounded) player.vy = hasFire ? -20 : -15; isPressing = true; }};
    window.onkeyup = (e) => { if(e.code === "Space") isPressing = false; };

    function loop() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        groundY = canvas.height / 1.5;

        // Fond
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Sol
        ctx.fillStyle = "#333";
        ctx.fillRect(0, groundY, canvas.width, canvas.height);
        ctx.fillStyle = "#00ffcc";
        ctx.fillRect(0, groundY, canvas.width, 4);

        if(playing) {
            // Physique
            if(player.mode === 'ship') {
                player.vy += isPressing ? -0.7 : 0.7;
                player.vy *= 0.95;
            } else {
                player.vy += player.gravity;
            }
            
            player.y += player.vy;

            if(player.y > groundY - player.size) {
                player.y = groundY - player.size;
                player.vy = 0;
                player.grounded = true;
            } else {
                player.grounded = false;
            }

            // Spawn obstacles
            if(nextSpawn-- <= 0) {
                obstacles.push({ x: canvas.width, w: 30, h: 40 });
                nextSpawn = 60 + Math.random() * 50;
            }

            // Mouvement obstacles
            let speed = hasSpeed ? 15 : 10;
            ctx.fillStyle = "red";
            for(let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= speed;

                // Dessin obstacle
                ctx.beginPath();
                ctx.moveTo(o.x, groundY);
                ctx.lineTo(o.x + o.w/2, groundY - o.h);
                ctx.lineTo(o.x + o.w, groundY);
                ctx.fill();

                // Collision
                let hit = player.x < o.x + o.w && player.x + player.size > o.x && player.y + player.size > groundY - o.h;
                if(hit && !document.getElementById("godMode").checked) {
                    playing = false;
                    document.getElementById("menu").style.display = "flex";
                }
                if(o.x < -100) obstacles.splice(i, 1);
            }
        }

        // Dessin Joueur
        ctx.fillStyle = hasFire ? "orange" : "#00ffcc";
        if(player.mode === 'cube') {
            ctx.fillRect(player.x, player.y, player.size, player.size);
        } else {
            // Dessin simple Vaisseau
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x + 40, player.y + 20);
            ctx.lineTo(player.x, player.y + 40);
            ctx.fill();
        }

        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
