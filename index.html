<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Geo Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; background: #050505; }
        
        #menu { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 10; color: white; }
        #admin { position: absolute; top: 10px; right: 10px; background: red; color: white; padding: 10px; z-index: 20; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #adminBox { position: absolute; top: 60px; right: 10px; background: #222; padding: 15px; display: none; z-index: 20; color: white; border: 1px solid red; }
        
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #00ffcc; border: none; font-weight: bold; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="admin" onclick="showAdmin()">ADMIN PANEL</div>
    <div id="adminBox">
        <label><input type="checkbox" id="god"> GOD MODE</label><br><br>
        <button onclick="addCoins()" style="padding:5px; font-size:12px;">+1000 PIÈCES</button>
    </div>

    <div id="menu">
        <h1>GEOMETRY DASH FIX</h1>
        <p>Espace ou Clic pour sauter</p>
        <button onclick="startGame()">JOUER</button>
    </div>

    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const menu = document.getElementById("menu");
    const godCheck = document.getElementById("god");

    let playing = false;
    let score = 0;
    let groundY;
    let obstacles = [];
    let nextSpawn = 0;

    let player = {
        x: 80,
        y: 0,
        size: 40,
        vy: 0,
        gravity: 0.8,
        jump: -15,
        grounded: false
    };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        groundY = canvas.height - 100;
        if(!playing) player.y = groundY - player.size;
    }
    window.onresize = resize;
    resize();

    // COMMANDES
    function doJump() {
        if(player.grounded) {
            player.vy = player.jump;
            player.grounded = false;
        }
    }

    window.onmousedown = () => { if(playing) doJump(); };
    window.onkeydown = (e) => { if(e.code === "Space" && playing) doJump(); };
    window.ontouchstart = (e) => { if(playing) { doJump(); e.preventDefault(); } };

    function showAdmin() {
        const box = document.getElementById("adminBox");
        box.style.display = box.style.display === "none" ? "block" : "none";
    }

    function addCoins() {
        alert("1000 pièces ajoutées ! (Admin)");
    }

    function startGame() {
        playing = true;
        score = 0;
        obstacles = [];
        player.y = groundY - player.size;
        player.vy = 0;
        menu.style.display = "none";
    }

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // SOL
        ctx.fillStyle = "#111";
        ctx.fillRect(0, groundY, canvas.width, 100);
        ctx.fillStyle = "#00ffcc";
        ctx.fillRect(0, groundY, canvas.width, 2);

        if(playing) {
            // PHYSIQUE
            player.vy += player.gravity;
            player.y += player.vy;

            if(player.y > groundY - player.size) {
                player.y = groundY - player.size;
                player.vy = 0;
                player.grounded = true;
            }

            // SPAWN
            if(nextSpawn-- <= 0) {
                obstacles.push({ x: canvas.width, w: 30, h: 40 });
                nextSpawn = 70 + Math.random() * 50;
            }

            // OBSTACLES
            ctx.fillStyle = "red";
            for(let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= 8;

                // DESSIN TRIANGLE
                ctx.beginPath();
                ctx.moveTo(o.x, groundY);
                ctx.lineTo(o.x + o.w/2, groundY - o.h);
                ctx.lineTo(o.x + o.w, groundY);
                ctx.fill();

                // COLLISION
                if(player.x < o.x + o.w && player.x + player.size > o.x && player.y + player.size > groundY - o.h) {
                    if(!godCheck.checked) {
                        playing = false;
                        menu.style.display = "flex";
                    }
                }
                if(o.x < -50) obstacles.splice(i, 1);
            }
        }

        // JOUEUR
        ctx.fillStyle = godCheck.checked ? "gold" : "#00ffcc";
        ctx.fillRect(player.x, player.y, player.size, player.size);
        ctx.strokeStyle = "white";
        ctx.strokeRect(player.x, player.y, player.size, player.size);

        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
