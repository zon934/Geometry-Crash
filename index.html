<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Crash PRO - Levels</title>
    <style>
        :root { --primary: #00ffcc; }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; font-family: 'Arial Black', sans-serif; position: fixed; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.9); z-index: 10; color: white; }
        .container { text-align: center; padding: 25px; border: 3px solid var(--primary); border-radius: 30px; background: #111; width: 90%; max-width: 500px; box-shadow: 0 0 50px rgba(0,255,204,0.1); }
        
        .menu-row { margin: 15px 0; }
        select { background: #222; color: white; border: 2px solid var(--primary); padding: 10px; border-radius: 10px; font-family: inherit; width: 100%; font-size: 18px; outline: none; }
        
        button { padding: 15px 40px; font-size: 22px; font-weight: 900; background: var(--primary); border: none; border-radius: 15px; cursor: pointer; text-transform: uppercase; color: #000; width: 100%; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        
        .colors { display: flex; gap: 10px; margin: 15px 0; justify-content: center; }
        .dot { width: 30px; height: 30px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; }
        .dot.active { border-color: white; transform: scale(1.1); }

        #rotate-message { display: none; position: fixed; inset: 0; background: #000; color: white; z-index: 100; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        @media (orientation: portrait) { #rotate-message { display: flex; } }
    </style>
</head>
<body>

<div id="rotate-message"><h1>🔄</h1><h2>PASSE EN MODE PAYSAGE</h2><p>Le jeu nécessite un écran large.</p></div>

<div id="ui">
    <div class="container">
        <h1 id="msg">GEO CRASH</h1>
        <div id="best-score">Record: 0</div>
        
        <div class="menu-row">
            <label>DIFFICULTÉ :</label>
            <select id="levelSelect">
                <option value="facile">FACILE (Vitesse lente)</option>
                <option value="moyen" selected>MOYEN (Standard)</option>
                <option value="difficile">DIFFICILE (Beaucoup de piques)</option>
                <option value="impossible">IMPOSSIBLE (Cauchemar)</option>
            </select>
        </div>

        <div class="colors">
            <div class="dot active" style="background:#00ffcc" data-color="#00ffcc"></div>
            <div class="dot" style="background:#ffea00" data-color="#ffea00"></div>
            <div class="dot" style="background:#ff0077" data-color="#ff0077"></div>
            <div class="dot" style="background:#0099ff" data-color="#0099ff"></div>
        </div>
        
        <button id="playBtn">LANCER</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");
const playBtn = document.getElementById("playBtn");
const levelSelect = document.getElementById("levelSelect");

let isPlaying = false, isPressing = false;
let groundY, ceilingY, score = 0, speed = 8, shake = 0, bgOffset = 0;
let obstacles = [], portals = [], pillars = [];
let nextSpawn = 0, nextPortal = 400;

let highScore = localStorage.getItem("geoCrashScore") || 0;
let deaths = parseInt(localStorage.getItem("geoCrashDeaths")) || 0;
document.getElementById("best-score").innerText = `Record: ${highScore}`;

let player = {
    x: 150, y: 0, size: 40, vy: 0, gravity: 0.9, jump: -16, 
    rot: 0, color: "#00ffcc", grounded: false, 
    mode: "cube", gravDir: 1 
};

// Configuration des niveaux
const diffSettings = {
    facile: { speed: 6, accel: 0.0005, spawnRate: 50 },
    moyen: { speed: 8.5, accel: 0.001, spawnRate: 35 },
    difficile: { speed: 11, accel: 0.002, spawnRate: 25 },
    impossible: { speed: 14, accel: 0.003, spawnRate: 15 }
};

function resize() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    groundY = canvas.height - 80; ceilingY = 80;
}
window.addEventListener('resize', resize);
resize();

// --- INPUTS ---
const inputStart = (e) => { isPressing = true; if(isPlaying && player.mode === "cube") jump(); };
const inputEnd = () => { isPressing = false; };
window.addEventListener('mousedown', inputStart);
window.addEventListener('mouseup', inputEnd);
window.addEventListener('touchstart', (e) => { if(e.target.tagName !== "BUTTON") { inputStart(); e.preventDefault(); } }, {passive: false});
window.addEventListener('touchend', inputEnd);

function jump() {
    if (player.grounded) {
        player.vy = player.jump * player.gravDir;
        player.grounded = false;
    }
}

playBtn.addEventListener('click', () => {
    deaths++;
    localStorage.setItem("geoCrashDeaths", deaths);
    const config = diffSettings[levelSelect.value];
    speed = config.speed;
    isPlaying = true;
    score = 0; obstacles = []; portals = []; pillars = [];
    player.vy = 0; player.rot = 0; player.mode = "cube"; player.gravDir = 1;
    ui.style.display = "none";
});

function gameOver() {
    isPlaying = false;
    shake = 25;
    if (Math.floor(score/10) > highScore) {
        highScore = Math.floor(score/10);
        localStorage.setItem("geoCrashScore", highScore);
    }
    document.getElementById("msg").innerText = "CRASH !";
    document.getElementById("best-score").innerText = `Record: ${highScore}`;
    ui.style.display = "flex";
}

function update() {
    if (!isPlaying) return;
    const config = diffSettings[levelSelect.value];

    // Physique
    if (player.mode === "ship") {
        player.vy += (isPressing ? -0.75 : 0.75) * player.gravDir;
        player.vy *= 0.96;
        player.rot = player.vy * 2.5;
    } else {
        player.vy += player.gravity * player.gravDir;
        if (!player.grounded) player.rot += 6 * player.gravDir;
    }
    player.y += player.vy;

    // Collisions Sols/Plafonds
    if (player.y >= groundY - player.size && player.gravDir === 1) {
        player.y = groundY - player.size; player.vy = 0; player.grounded = true; player.rot = Math.round(player.rot/90)*90;
    } else if (player.y <= ceilingY && player.gravDir === -1) {
        player.y = ceilingY; player.vy = 0; player.grounded = true; player.rot = Math.round(player.rot/90)*90;
    } else {
        player.grounded = false;
    }

    // Mort si sortie écran
    if (player.y < ceilingY - 10 || player.y > groundY + 10) gameOver();

    // Spawns
    if (nextSpawn-- <= 0) {
        if (player.mode === "cube") {
            obstacles.push({ x: canvas.width, w: 34, h: 40, type: player.gravDir === 1 ? 'bottom' : 'top' });
        } else {
            // Piliers en mode Vaisseau
            let gap = 160;
            let h = 50 + Math.random() * (groundY - ceilingY - gap - 50);
            pillars.push({ x: canvas.width, w: 50, h: h, pos: 'top' });
            pillars.push({ x: canvas.width, w: 50, h: (groundY - ceilingY) - h - gap, pos: 'bottom' });
        }
        nextSpawn = config.spawnRate + Math.random() * 20;
    }

    if (score > nextPortal) {
        portals.push({ x: canvas.width, type: player.mode === "cube" ? "ship" : "cube", grav: Math.random() > 0.6 ? -player.gravDir : player.gravDir });
        nextPortal = score + 800;
    }

    // Update & Collision Objets
    [...obstacles, ...portals, ...pillars].forEach((obj) => {
        obj.x -= speed;
        let pM = 6; // Marge
        if (player.x + player.size - pM > obj.x && player.x + pM < obj.x + (obj.w || 30)) {
            if (obj.h) { // Obstacle ou Pilier
                let hit = false;
                if ((obj.type === 'bottom' || obj.pos === 'bottom') && player.y + player.size - pM > groundY - obj.h) hit = true;
                if ((obj.type === 'top' || obj.pos === 'top') && player.y + pM < ceilingY + obj.h) hit = true;
                if (hit) gameOver();
            } else { // Portail
                player.mode = obj.type; player.gravDir = obj.grav;
                portals.splice(portals.indexOf(obj), 1);
            }
        }
    });

    speed += config.accel; bgOffset = (bgOffset + speed) % 100; score++;
}

function draw() {
    ctx.save();
    if (shake > 0) { ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.9; }
    
    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Tentative en fond
    if (isPlaying) {
        ctx.textAlign = "center"; ctx.font = "bold 80px Arial";
        ctx.fillStyle = "rgba(255, 255, 255, 0.04)";
        ctx.fillText("TENTATIVE " + deaths, canvas.width/2, canvas.height/2 + 30);
    }

    // Grille
    ctx.strokeStyle = "#111";
    for(let i=-bgOffset; i<canvas.width; i+=100) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
    
    // Décor Sols
    ctx.fillStyle = "#111"; ctx.fillRect(0, groundY, canvas.width, 80); ctx.fillRect(0, 0, canvas.width, ceilingY);
    ctx.fillStyle = player.color; ctx.shadowBlur = 15; ctx.shadowColor = player.color;
    ctx.fillRect(0, groundY, canvas.width, 2); ctx.fillRect(0, ceilingY, canvas.width, 2);

    // Piliers (Mode Vaisseau)
    ctx.fillStyle = "#222"; ctx.strokeStyle = player.color; ctx.lineWidth = 2;
    pillars.forEach(p => {
        let y = p.pos === 'top' ? ceilingY : groundY - p.h;
        ctx.fillRect(p.x, y, p.w, p.h);
        ctx.strokeRect(p.x, y, p.w, p.h);
    });

    // Portails
    portals.forEach(p => {
        ctx.fillStyle = p.type === "ship" ? "#ff00ff" : "#00ffff";
        ctx.fillRect(p.x, ceilingY, 30, groundY - ceilingY);
    });

    // Joueur
    ctx.save();
    ctx.translate(player.x + player.size/2, player.y + player.size/2);
    ctx.rotate(player.rot * Math.PI / 180);
    ctx.fillStyle = player.color; ctx.shadowBlur = 15; ctx.shadowColor = player.color;
    if(player.mode === "ship") {
        ctx.beginPath(); ctx.moveTo(-20, 15); ctx.lineTo(25, 0); ctx.lineTo(-20, -15); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
    } else {
        ctx.fillRect(-20, -20, 40, 40);
        ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.strokeRect(-20, -20, 40, 40);
    }
    ctx.restore();

    // Piques
    ctx.shadowBlur = 10; ctx.shadowColor = "#ff0055"; ctx.fillStyle = "#ff0055";
    obstacles.forEach(o => {
        ctx.beginPath();
        if(o.type === 'bottom') { ctx.moveTo(o.x, groundY); ctx.lineTo(o.x+17, groundY-o.h); ctx.lineTo(o.x+34, groundY); }
        else { ctx.moveTo(o.x, ceilingY); ctx.lineTo(o.x+17, ceilingY+o.h); ctx.lineTo(o.x+34, ceilingY); }
        ctx.fill();
    });

    ctx.restore();
    update();
    requestAnimationFrame(draw);
}

document.querySelectorAll('.dot').forEach(dot => {
    dot.addEventListener('click', () => {
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        dot.classList.add('active'); player.color = dot.dataset.color;
        document.documentElement.style.setProperty('--primary', player.color);
    });
});

draw();
</script>
</body>
</html>
